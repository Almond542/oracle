<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dragon Oracle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d1a;color:#e0e0e0;font-family:system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── Status bar ── */
#statusBar{background:#13132a;padding:6px 12px;font-size:13px;color:#aaa;display:flex;justify-content:space-between;flex-shrink:0}
#statusBar span{color:#ffd700;font-weight:600}

/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ══ Screen A — Camera ══════════════════════════════════════════ */
#camWrap{position:relative;flex:1;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover}
#frameGuide{position:absolute;inset:8%;border:2px dashed rgba(255,215,0,.5);border-radius:8px;pointer-events:none}
#spinner{display:none;position:absolute;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:14px;color:#ffd700}
#spinner.show{display:flex}
.spinner-ring{width:44px;height:44px;border:4px solid #333;border-top-color:#ffd700;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#camControls{display:flex;gap:10px;padding:12px;background:#13132a;flex-shrink:0}
#btnCapture{flex:1;padding:14px;background:linear-gradient(135deg,#d4a017,#ffd700);color:#0d0d1a;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 0 #8a6a00}
#btnCapture:active{transform:translateY(2px);box-shadow:0 2px 0 #8a6a00}
#btnReset{padding:14px 18px;background:#2a1a3a;color:#c084fc;border:1px solid #7e22ce;border-radius:10px;font-size:14px;cursor:pointer}

/* ══ Screen B — Result ══════════════════════════════════════════ */
#resultScreen{align-items:center;justify-content:center;gap:14px;padding:16px}
#resultGrid{width:100%;max-width:380px;border-radius:8px;border:2px solid #333}
#resultMsg{color:#22c55e;font-size:15px;text-align:center;padding:0 12px}
#btnDone{padding:14px 40px;background:linear-gradient(135deg,#d4a017,#ffd700);color:#0d0d1a;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer}

/* ── Toast ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#444;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="statusBar">
  <span id="statusText">0 / 60 revealed</span>
  <span>Dragon Oracle</span>
</div>

<!-- ══ Screen A: Camera ══════════════════════════════════════════ -->
<div id="camScreen" class="screen active">
  <div id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="frameGuide"></div>
    <div id="spinner">
      <div class="spinner-ring"></div>
      <span id="spinnerMsg">Detecting cards…</span>
    </div>
  </div>
  <div id="camControls">
    <button id="btnReset" onclick="resetBoard()">Reset</button>
    <button id="btnCapture" onclick="capturePhoto()">📸 Capture</button>
  </div>
</div>

<!-- ══ Screen B: Result ══════════════════════════════════════════ -->
<div id="resultScreen" class="screen">
  <img id="resultGrid" src="" alt="Current grid">
  <p id="resultMsg"></p>
  <button id="btnDone" onclick="showScreen('camScreen')">Done ✓</button>
</div>

<canvas id="canvas" style="display:none"></canvas>
<div id="toast"></div>

<script>
const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const spinner    = document.getElementById('spinner');
const spinnerMsg = document.getElementById('spinnerMsg');

// ── Camera ────────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
  } catch {
    showToast('Camera access denied. Open via HTTPS and accept the cert warning once.');
  }
}
initCamera();

// ── Status polling ────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    document.getElementById('statusText').textContent =
      `${d.revealed} / ${d.total} revealed`;
  } catch {}
}
fetchStatus();
setInterval(fetchStatus, 12000);

// ── Screen helper ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Capture photo ─────────────────────────────────────────────────────────
async function capturePhoto() {
  document.getElementById('btnCapture').disabled = true;
  spinnerMsg.textContent = 'Detecting cards…';
  spinner.classList.add('show');

  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
  ctx.drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    try {
      const fd = new FormData();
      fd.append('image', blob, 'capture.jpg');
      const resp = await fetch('/capture', { method: 'POST', body: fd });
      const data = await resp.json();

      spinner.classList.remove('show');
      document.getElementById('btnCapture').disabled = false;

      if (data.error) { showToast(data.error); return; }

      await fetchStatus();

      if (data.count === 0) {
        showToast('No face-up cards detected — try again.');
        return;
      }

      // Show result screen with updated grid
      document.getElementById('resultGrid').src = '/grid.jpg?t=' + Date.now();
      const msg = data.placed > 0
        ? `${data.placed} card${data.placed > 1 ? 's' : ''} added to grid (${data.revealed}/${data.total} total)`
        : `${data.count} card${data.count > 1 ? 's' : ''} detected but cells already occupied`;
      document.getElementById('resultMsg').textContent = msg;
      showScreen('resultScreen');

    } catch {
      spinner.classList.remove('show');
      document.getElementById('btnCapture').disabled = false;
      showToast('Connection error — is the server running?');
    }
  }, 'image/jpeg', 0.9);
}

// ── Reset ─────────────────────────────────────────────────────────────────
async function resetBoard() {
  if (!confirm('Clear all placed cards and start over?')) return;
  await fetch('/reset', { method: 'POST' });
  await fetchStatus();
  showToast('Board cleared.');
}

// ── Toast ─────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
